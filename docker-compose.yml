version: '3.8'

name: whatsapp-multiagente

services:

  # ================================================================
  # OpenWA API Gateway - WhatsApp engine
  # ================================================================
  openwa-api:
    build:
      context: .
      dockerfile: openwa.Dockerfile
    container_name: openwa-api
    restart: unless-stopped
    networks:
      - whatsapp-net
    ports:
      - "8002:2785"
    volumes:
      - openwa_data:/app/data
    environment:
      - NODE_ENV=production
      - PORT=2785
      - HOME=/tmp
      - XDG_CONFIG_HOME=/tmp/.config
      - XDG_CACHE_HOME=/tmp/.cache
      - LOG_LEVEL=info

      # Database (SQLite local)
      - DATABASE_TYPE=sqlite
      - DATABASE_NAME=/app/data/openwa.sqlite
      - DATABASE_SYNCHRONIZE=false

      # WhatsApp engine
      - ENGINE_TYPE=whatsapp-web.js
      - SESSION_DATA_PATH=/app/data/sessions
      - PUPPETEER_HEADLESS=true
      - PUPPETEER_ARGS=--no-sandbox,--disable-setuid-sandbox,--disable-dev-shm-usage,--disable-gpu
      - WWEBJS_WEB_VERSION=2.3000.1041801898-alpha

      # Storage (local filesystem)
      - STORAGE_TYPE=local
      - STORAGE_LOCAL_PATH=/app/data/media

      # Security
      - API_MASTER_KEY=owa_master_key_cambiar_en_produccion

      # Webhook (apunta al backend en la misma red Docker)
      - WEBHOOK_URL=http://backend:5000/webhook/message
      - WEBHOOK_EVENTS=message.received,session.status,session.qr
      - WEBHOOK_TIMEOUT=10000
      - WEBHOOK_MAX_RETRIES=3
      - WEBHOOK_RETRY_DELAY=5000
      - WEBHOOK_SSRF_PROTECT=false

      # No Redis, no queue, no extras
      - REDIS_ENABLED=false
      - QUEUE_ENABLED=false

      - TZ=America/Caracas

    security_opt:
      - 'no-new-privileges:true'
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - DAC_OVERRIDE
      - FOWNER
      - SETGID
      - SETUID
    read_only: true
    tmpfs:
      - /tmp
    pids_limit: 512
    mem_limit: ${OPENWA_MEM_LIMIT:-2g}
    healthcheck:
      test: ['CMD', 'node', '-e', "require('http').get('http://localhost:2785/api/health/ready', (r) => process.exit(r.statusCode === 200 ? 0 : 1))"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 40s

  # ================================================================
  # OpenWA Dashboard - Web UI para gestionar sesiones
  # ================================================================
  openwa-dashboard:
    build:
      context: ./OpenWA/dashboard
      dockerfile: Dockerfile
    container_name: openwa-dashboard
    restart: unless-stopped
    networks:
      - whatsapp-net
    ports:
      - "2886:80"
    depends_on:
      openwa-api:
        condition: service_healthy
    environment:
      - API_URL=http://openwa-api:2785
    security_opt:
      - 'no-new-privileges:true'
    read_only: true
    tmpfs:
      - /tmp
      - /var/run
      - /var/cache/nginx
      - /var/lib/nginx
    mem_limit: 128m

  # ================================================================
  # Backend Multiagente - Express + Socket.io + Prisma
  # ================================================================
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: whatsapp-backend
    restart: unless-stopped
    networks:
      - whatsapp-net
    ports:
      - "5000:5000"
    volumes:
      - backend_data:/app/data
    depends_on:
      openwa-api:
        condition: service_healthy
    environment:
      - PORT=5000
      - OPENWA_API_URL=http://openwa-api:2785
      - OPENWA_TOKEN=owa_master_key_cambiar_en_produccion
      - OPENWA_SESSION_ID=3e0744aa-b04c-4676-9b41-88322d155e5d
      - JWT_SECRET=cambiar_esto_por_un_secreto_seguro_en_produccion
      - DATABASE_URL=file:./data/dev.db
      - NODE_ENV=production
    mem_limit: 256m

# ================================================================
# Volúmenes persistentes
# ================================================================
volumes:
  openwa_data:
    driver: local
  backend_data:
    driver: local

# ================================================================
# Red interna (todos los servicios se ven por nombre)
# ================================================================
networks:
  whatsapp-net:
    name: whatsapp-net
    driver: bridge
